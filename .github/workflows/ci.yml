name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NXF_VER: '24.10.5'

jobs:
  quality:
    name: Lint + unit tests (Python tooling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check bin tests
      - name: Pytest (unit/integration)
        run: pytest
      - name: Validate bundled samplesheet
        run: python3 bin/validate_samplesheet.py assets/samplesheet.csv --check-files
      - name: actionlint (workflow lint)
        run: docker run --rm -v "$PWD":/repo -w /repo rhysd/actionlint:1.7.7 -color

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  test:
    name: Pipeline + correctness (${{ matrix.caller }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        caller: [bcftools, freebayes, gatk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version
      - name: Run pipeline (${{ matrix.caller }})
        run: nextflow run . -profile docker,test --caller ${{ matrix.caller }} --outdir results
      - name: Assert known SNPs were recovered (all samples)
        run: |
          for s in sample1 sample2; do
            python3 bin/check_variants.py \
              --vcf results/variants/$s.vcf.gz \
              --truth assets/test_data/truth_$s.tsv
          done
      - name: Data-quality gate (alignment + coverage)
        run: |
          for s in sample1 sample2; do
            python3 bin/check_qc.py \
              --stats results/stats/$s.samtools_stats.txt \
              --mosdepth-summary results/coverage/$s.mosdepth.summary.txt \
              --min-mapped-rate 0.90 --min-mean-coverage 20
          done
      - name: Snapshot regression (golden VCF)
        if: matrix.caller == 'bcftools'
        run: |
          python3 bin/compare_vcfs.py \
            assets/golden/sample1.bcftools.vcf.gz \
            results/variants/sample1.vcf.gz \
            --label-a golden --label-b current --require-identical
      - name: Publish pipeline metrics to job summary
        if: always()
        run: |
          python3 bin/pipeline_metrics.py \
            --trace results/pipeline_info/trace.txt \
            --out-md metrics.md --out-json metrics.json
          cat metrics.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.caller }}
          path: |
            results
            metrics.json

  rnaseq:
    name: RNA-seq (Salmon quantification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Run RNA-seq quantification
        run: nextflow run rnaseq.nf -profile docker --outdir results_rna
      - name: Assert expression ranking recovered
        run: |
          python3 bin/check_expression.py \
            --quant results_rna/salmon/rna1/quant.sf \
            --truth assets/rnaseq_test_data/truth_expression.tsv
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results_rna
          path: results_rna

  reproducibility:
    name: Reproducibility (determinism check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Run pipeline twice
        run: |
          nextflow run . -profile docker,test --outdir run1
          nextflow run . -profile docker,test --outdir run2
      - name: Assert identical variant calls
        run: |
          python3 bin/compare_vcfs.py \
            run1/variants/sample1.vcf.gz \
            run2/variants/sample1.vcf.gz \
            --label-a run1 --label-b run2 --require-identical

  nf-test:
    name: nf-test (Nextflow modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Install nf-test
        run: |
          curl -fsSL https://get.nf-test.com | bash
          sudo mv nf-test /usr/local/bin/
          nf-test version
      - name: Run nf-test
        run: nf-test test --profile docker
