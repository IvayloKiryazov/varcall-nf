name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NXF_VER: '24.10.5'

jobs:
  test:
    name: Run pipeline on bundled test data
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java (required by Nextflow)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      - name: Run pipeline (docker + test profile)
        run: nextflow run . -profile docker,test --outdir results

      - name: Assert known SNPs were recovered
        run: |
          python3 bin/check_variants.py \
            --vcf results/variants/sample1.vcf.gz \
            --truth assets/test_data/truth_snps.tsv

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results
